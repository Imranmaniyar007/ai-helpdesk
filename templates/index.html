<!DOCTYPE html>
<html>

<head>

    <title>AI HelpDesk</title>
    <link rel="stylesheet" href="/static/style.css">

</head>

<body>
    <div class="cyber-bg">
        <div class="grid"></div>
        <div class="glow"></div>
        <div class="particles"></div>
    </div>
    <div class="bg-animation"></div>

    <nav id="navbar">

        <div class="logo">
            <div class="ai-logo">AI</div>
            <span>HelpDesk</span>
        </div>

    </nav>

    <div class="main">

        <div class="chat-card">

            <div class="chat-area" id="chat">
                <div class="robot-intro" id="robotIntro">

                    <div class="robot-head">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>

                    <h2 class="robot-text">Hello My Friend… How can I assist you today?</h2>

                </div>
            </div>
            <div class="suggestions">
                <button onclick="quick('wifi not working')">Wifi</button>
                <button onclick="quick('laptop slow')">Slow</button>
                <button onclick="quick('heating issue')">Heating</button>
            </div>

            <div class="input-area">

                <input id="question" placeholder="Ask your technical issue...">
                <button onclick="sendMessage()" class="send-btn">
                    ➤
                </button>

            </div>

        </div>

    </div>

    <footer>
        © 2026 AI HelpDesk Expert System
    </footer>

    <script>

async function sendMessage() {

    let input = document.getElementById("question")
    let msg = input.value

    if (msg === "") return

    let chat = document.getElementById("chat")

    chat.innerHTML += `<div class="user-msg">${msg}</div>`

    input.value = ""

    // thinking animation
    chat.innerHTML += `<div class="bot-msg" id="thinking">AI is thinking<span>.</span><span>.</span><span>.</span></div>`

    let res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
    })

    let data = await res.json()

    document.getElementById("thinking").remove()

    let bubble = document.createElement("div")
    bubble.className = "bot-msg"
    chat.appendChild(bubble)

    typeText(bubble, data.reply)

}

function typeText(el, text) {
    let i = 0
    let interval = setInterval(() => {
        el.innerHTML += text[i]
        i++
        if (i >= text.length) clearInterval(interval)
    }, 20)
}

function quick(q) {
    document.getElementById("question").value = q
    sendMessage()
}

// ENTER key
document.getElementById("question").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage()
    }
})

</script>

</body>

</html>
