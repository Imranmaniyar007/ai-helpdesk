<!DOCTYPE html>
<html>

<head>
    <link rel="icon" href="/static/logo.png" type="image/png">
    <title>AI HelpDesk</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav id="navbar">

    <!-- LEFT SIDE -->
    <div class="nav-left">
        <button id="toggleHistory" class="icon-btn">☰</button>

        <div class="logo">
            <div class="ai-logo">AI</div>
            <span>HelpDesk</span>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="nav-right">
        <a href="/logout" class="nav-btn logout">Logout</a>
    </div>

</nav>

<!-- HISTORY PANEL -->
<div id="historyPanel" class="history-panel">
    <h3>Chat History</h3>
    <div id="historyList"></div>
</div>

<!-- BACKGROUND -->
<div class="cyber-bg">
    
</div>

<!-- MAIN -->
<div class="main">

    <div class="chat-card">

        <!-- CHAT -->
        <div class="chat-area" id="chat">
            <div class="robot-intro">
                <div class="robot-head">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <h2 class="robot-text">
                    Hello My Friend… How can I assist you today?
                </h2>
            </div>
        </div>

        <!-- COMMON PROBLEMS -->
        <div class="recommend-box">
            <p>Common Problems:</p>
            <div class="suggestions">
                <button onclick="quick('wifi not working')">WiFi</button>
                <button onclick="quick('laptop slow')">Slow</button>
                <button onclick="quick('heating issue')">Heating</button>
                <button onclick="quick('battery draining fast')">Battery</button>
                <button onclick="quick('internet not working')">Internet</button>
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <input id="question" placeholder="Ask your technical issue...">
            <button onclick="sendMessage()" class="send-btn">➤</button>
        </div>

    </div>

</div>

<!-- FOOTER -->
<footer>
    © 2026 AI HelpDesk | Contact: 992260XXXX
</footer>

<script>

let history = JSON.parse(localStorage.getItem("chatHistory")) || []

// TOGGLE HISTORY
document.getElementById("toggleHistory").onclick = () => {
    document.getElementById("historyPanel").classList.toggle("active")
}

// SEND MESSAGE
async function sendMessage() {

    let input = document.getElementById("question")
    let msg = input.value

    if (msg === "") return

    saveHistory(msg)

    let chat = document.getElementById("chat")

    chat.innerHTML += `<div class="user-msg">${msg}</div>`

    input.value = ""

    chat.innerHTML += `<div class="bot-msg" id="thinking">AI is thinking...</div>`

    let res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
    })

    let data = await res.json()

    document.getElementById("thinking").remove()

    let bubble = document.createElement("div")
    bubble.className = "bot-msg"
    chat.appendChild(bubble)

    typeText(bubble, data.reply)
    bubble.innerHTML += `
<div class="follow-ups">
    <button onclick="quick('still not working')">Still not working</button>
    <button onclick="quick('any other solution')">More help</button>
</div>
`

}

// TYPE EFFECT
function typeText(el, text) {
    let i = 0
    let interval = setInterval(() => {
        el.innerHTML += text[i]
        i++
        if (i >= text.length) clearInterval(interval)
    }, 15)
}

// HISTORY
function saveHistory(msg){
    history.push(msg)
    localStorage.setItem("chatHistory", JSON.stringify(history))
    loadHistory()
}

function loadHistory(){
    let list = document.getElementById("historyList")
    list.innerHTML = ""

    history.slice(-10).forEach(h=>{
        list.innerHTML += `<div class="history-item">${h}</div>`
    })
}

function quick(q) {
    document.getElementById("question").value = q
    sendMessage()
}

document.getElementById("question").addEventListener("keypress", function(e){
    if(e.key === "Enter") sendMessage()
})

loadHistory()

</script>

</body>
</html>
